<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ข้อมูลปริมาณจราจร{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">&#128663; ข้อมูลปริมาณจราจร</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% block nav_tl %}{% endblock %}" href="/tl">
                        กรมทางหลวง (ทล.)
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_tch %}{% endblock %}" href="/tch">
                        ทางหลวงชนบท (ทช.)
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top bg-white mt-4">
    <small>ระบบข้อมูลปริมาณจราจรเฉลี่ยรายวัน (AADT)</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
